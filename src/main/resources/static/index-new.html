<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 工作流引擎</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

  <!-- CSS 文件 -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/toolbar.css">
  <link rel="stylesheet" href="css/canvas.css">
  <link rel="stylesheet" href="css/nodes.css">
  <link rel="stylesheet" href="css/edges.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/logs.css">
  <link rel="stylesheet" href="css/operations.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/ux-panel-base.css">
  <link rel="stylesheet" href="css/ux-panel-buttons.css">
  <link rel="stylesheet" href="css/ux-interact-base.css">
  <link rel="stylesheet" href="css/ux-interact-advanced.css">
  <link rel="stylesheet" href="css/enhance-ui.css">
  <link rel="stylesheet" href="css/enhance-ui-extra.css">
  <link rel="stylesheet" href="css/enhance-anim.css">
  <link rel="stylesheet" href="css/enhance-anim-extra.css">
</head>
<body>
  <!-- 加载 HTML 组件 -->
  <div id="app-root"></div>

  <!-- JS 文件 -->
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api-logger.js"></script>
  <script src="js/path-selector.js"></script>
  <script src="js/panels.js"></script>
  <script src="js/zoom.js"></script>
  <script src="js/pan.js"></script>
  <script src="js/zoom-minimap.js"></script>
  <script src="js/workflow-render.js"></script>
  <script src="js/folder-actions.js"></script>
  <script src="js/workflow-actions.js"></script>
  <script src="js/workflow-save.js"></script>
  <script src="js/render-nodes.js"></script>
  <script src="js/render-helpers.js"></script>
  <script src="js/edges.js"></script>
  <script src="js/panel-tabs.js"></script>
  <script src="js/property-panel.js"></script>
  <script src="js/node-select.js"></script>
  <script src="js/execution-control.js"></script>
  <script src="js/websocket.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/connect.js"></script>
  <script src="js/global-config-ui.js"></script>
  <script src="js/global-config-actions.js"></script>
  <script src="js/task-config.js"></script>
  <script src="js/keyboard-shortcuts.js"></script>
  <script src="js/undo-redo.js"></script>
  <script src="js/ux-helpers.js"></script>
  <script src="js/prompt-templates.js"></script>
  <script src="js/selection.js"></script>
  <script src="js/search.js"></script>
  <script src="js/node-context-menu.js"></script>
  <script src="js/canvas-context-menu.js"></script>
  <script src="js/toast.js"></script>

  <!-- 加载 HTML 组件并初始化 -->
  <script>
    // 加载 HTML 组件
    async function loadHTMLComponents() {
      const root = document.getElementById('app-root');
      const components = [
        'html/sidebar.html',
        'html/canvas.html',
        'html/right-panel.html',
        'html/toast.html',
        'html/shortcuts.html',
        'html/context-menus.html',
        'html/modals-workflow.html',
        'html/modals-config.html',
        'html/panels.html'
      ];

      let html = '';
      for (const comp of components) {
        try {
          const res = await fetch(comp);
          html += await res.text();
        } catch (e) {
          console.error('Failed to load:', comp);
        }
      }
      root.innerHTML = html;

      // 触发初始化
      if (typeof onComponentsLoaded === 'function') {
        onComponentsLoaded();
      }
    }

    // 页面加载后执行
    document.addEventListener('DOMContentLoaded', loadHTMLComponents);
  </script>
</body>
</html>
