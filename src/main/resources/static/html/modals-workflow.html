  <!-- 快速操作面板 -->
  <div class="quick-actions" id="quickActions"></div>

  <!-- 创建工作流模态框 -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">新建工作流</div>
        <button class="modal-close" onclick="closeModal('createModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">工作流名称</label>
          <input type="text" class="form-input" id="newWorkflowName" placeholder="输入名称">
        </div>
        <div class="form-group">
          <label class="form-label">描述</label>
          <textarea class="form-input form-textarea" id="newWorkflowDesc" placeholder="输入描述"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('createModal')">取消</button>
        <button class="btn btn-primary" onclick="createWorkflow()">创建</button>
      </div>
    </div>
  </div>

  <!-- AI生成工作流模态框 -->
  <div class="modal-overlay" id="aiGenerateModal">
    <div class="modal" style="width: 520px;">
      <div class="modal-header">
        <div class="modal-title">✨ AI 生成工作流</div>
        <button class="modal-close" onclick="closeModal('aiGenerateModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">工作流名称（可选）</label>
          <input type="text" class="form-input" id="aiWorkflowName" placeholder="不填则自动命名">
        </div>
        <div class="form-group">
          <label class="form-label">描述您的需求</label>
          <textarea class="form-input form-textarea" id="aiWorkflowDesc" style="min-height: 120px;" placeholder="例如：&#10;- 创建一个数据处理工作流，包含数据获取、转换和输出&#10;- 需要调用API获取数据，然后由Agent处理并人工审核&#10;- 并行执行多个任务，最后汇总结果"></textarea>
        </div>
        <div class="ai-tips">
          <div class="ai-tip-title">💡 提示：可以描述</div>
          <div class="ai-tip-items">
            <span class="ai-tip-tag" onclick="appendAiDesc('Agent执行数据处理')">Agent执行</span>
            <span class="ai-tip-tag" onclick="appendAiDesc('API调用')">API调用</span>
            <span class="ai-tip-tag" onclick="appendAiDesc('条件判断')">条件判断</span>
            <span class="ai-tip-tag" onclick="appendAiDesc('人工审核')">人工审核</span>
            <span class="ai-tip-tag" onclick="appendAiDesc('并行执行')">并行执行</span>
            <span class="ai-tip-tag" onclick="appendAiDesc('错误处理')">错误处理</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('aiGenerateModal')">取消</button>
        <button class="btn btn-primary" id="aiGenerateBtn" onclick="generateWorkflowWithAI()">✨ 生成工作流</button>
      </div>
    </div>
  </div>

  <!-- 全局配置模态框 -->
  <div class="modal-overlay" id="globalConfigModal">
    <div class="modal" style="width: 640px;">
      <div class="modal-header">
        <div class="modal-title">⚙️ 全局配置</div>
        <button class="modal-close" onclick="closeModal('globalConfigModal')">×</button>
      </div>
      <div class="modal-body">
        <!-- OpenClaw配置文件 -->
        <div class="config-section">
          <div class="config-section-title">📁 OpenClaw 配置文件</div>
          <div class="form-group">
            <label class="form-label">openclaw.json 路径</label>
            <div class="file-input-group">
              <input type="text" class="form-input" id="openclawJsonPath" placeholder="/path/to/openclaw.json">
              <button class="btn btn-secondary" onclick="selectOpenclawJson()">📁 选择文件</button>
              <button class="btn btn-secondary" onclick="loadAgentsFromConfig()">🔄 加载</button>
            </div>
            <div class="form-hint">用于获取 AgentID 列表，支持手动输入或选择文件</div>
          </div>
          <div class="form-group" id="agentListSection" style="display:none;">
            <label class="form-label">可用 Agents</label>
            <div class="agent-list" id="availableAgents"></div>
          </div>
        </div>

        <!-- 全局提示词 -->
        <div class="config-section">
          <div class="config-section-title">📝 全局提示词</div>
          <div class="form-group">
            <label class="form-label">提示词文件</label>
            <div class="file-input-group">
              <input type="text" class="form-input" id="globalPromptFile" placeholder="/path/to/project/prompt.md">
              <button class="btn btn-secondary" onclick="selectPromptFile()">📄 选择文件</button>
              <button class="btn btn-secondary" onclick="loadGlobalPrompt()">🔄 加载</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">提示词内容</label>
            <textarea class="form-input form-textarea" id="globalPromptContent" style="min-height: 150px; font-family: Monaco, monospace; font-size: 12px;" placeholder="全局提示词内容，可从文件加载或直接编辑..."></textarea>
          </div>
        </div>

        <!-- 其他全局设置 -->
        <div class="config-section">
          <div class="config-section-title">🔧 其他设置</div>
          <div class="form-row">
            <div class="form-group" style="flex:1;">
