  <!-- 快捷键帮助面板 -->
  <div class="shortcut-help" id="shortcutHelpPanel">
    <h3>⌨️ 快捷键帮助</h3>
    <div class="shortcut-group">
      <div class="shortcut-group-title">编辑操作</div>
      <div class="shortcut-item"><span>复制</span><span class="shortcut-key">Ctrl+C</span></div>
      <div class="shortcut-item"><span>粘贴</span><span class="shortcut-key">Ctrl+V</span></div>
      <div class="shortcut-item"><span>剪切</span><span class="shortcut-key">Ctrl+X</span></div>
      <div class="shortcut-item"><span>复制为副本</span><span class="shortcut-key">Ctrl+D</span></div>
      <div class="shortcut-item"><span>撤销</span><span class="shortcut-key">Ctrl+Z</span></div>
      <div class="shortcut-item"><span>重做</span><span class="shortcut-key">Ctrl+Y</span></div>
      <div class="shortcut-item"><span>全选</span><span class="shortcut-key">Ctrl+A</span></div>
      <div class="shortcut-item"><span>删除</span><span class="shortcut-key">Delete</span></div>
    </div>
    <div class="shortcut-group">
      <div class="shortcut-group-title">画布操作</div>
      <div class="shortcut-item"><span>搜索节点</span><span class="shortcut-key">Ctrl+F</span></div>
      <div class="shortcut-item"><span>放大</span><span class="shortcut-key">Ctrl++</span></div>
      <div class="shortcut-item"><span>缩小</span><span class="shortcut-key">Ctrl+-</span></div>
      <div class="shortcut-item"><span>适应画布</span><span class="shortcut-key">Ctrl+0</span></div>
      <div class="shortcut-item"><span>平移画布</span><span class="shortcut-key">Ctrl+拖动</span></div>
      <div class="shortcut-item"><span>框选节点</span><span class="shortcut-key">拖动空白处</span></div>
    </div>
    <div class="shortcut-group">
      <div class="shortcut-group-title">文件操作</div>
      <div class="shortcut-item"><span>保存工作流</span><span class="shortcut-key">Ctrl+S</span></div>
    </div>
    <div class="shortcut-group">
      <div class="shortcut-group-title">其他</div>
      <div class="shortcut-item"><span>显示此帮助</span><span class="shortcut-key">?</span></div>
      <div class="shortcut-item"><span>关闭弹窗</span><span class="shortcut-key">Esc</span></div>
    </div>
  </div>
