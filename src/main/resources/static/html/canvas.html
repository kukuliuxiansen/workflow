    <!-- 主内容区 - 工具栏、画布、日志都是独立浮动层 -->
    <div class="toolbar" id="toolbar">
      <div class="toolbar-group">
        <button class="toolbar-btn" onclick="saveWorkflow()">保存</button>
        <button class="toolbar-btn" onclick="validateWorkflow()">验证</button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn ai-btn" onclick="showAiGenerateModal()">✨ AI生成</button>
        <button class="toolbar-btn" onclick="showAddNodeModal()">添加节点</button>
        <button class="toolbar-btn danger" onclick="deleteSelectedNode()">删除节点</button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" onclick="showGlobalConfigModal()">⚙️ 全局配置</button>
        <button class="toolbar-btn" onclick="showTaskConfigModal()">📋 任务配置</button>
        <button class="toolbar-btn" onclick="openHistoryPanel()">历史</button>
        <button class="toolbar-btn" onclick="exportYAML()">导出</button>
      </div>
      <div class="status-indicator">
        <span id="saveIndicator" class="save-indicator saved">✓ 已保存</span>
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">就绪</span>
      </div>
      <button class="toolbar-btn primary" onclick="executeWorkflow()" id="btnExecute">执行</button>
    </div>

    <div class="canvas-container" id="canvasContainer">
      <div class="canvas-grid"></div>
      <div class="canvas-boundary"></div>
      <div class="canvas" id="canvas">
        <div class="canvas-content" id="canvasContent">
          <svg class="edges-svg" id="edgesSvg"></svg>
        </div>
        <!-- 框选矩形 -->
        <div class="selection-rect" id="selectionRect"></div>
        <!-- 对齐辅助线容器 -->
        <div id="alignGuidesContainer"></div>
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomOut()">−</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="zoom-btn" onclick="zoomIn()">+</button>
        <button class="zoom-btn" onclick="zoomReset()">⟲</button>
      </div>
      <!-- 小地图 -->
      <div class="minimap" id="minimap">
        <canvas id="minimapCanvas" width="180" height="120"></canvas>
        <div class="minimap-viewport" id="minimapViewport"></div>
      </div>
      <!-- 画布信息统计 -->
      <div class="canvas-info" id="canvasInfo">
        <div class="canvas-info-item">节点: <span class="canvas-info-value" id="nodeCount">0</span></div>
        <div class="canvas-info-item">连线: <span class="canvas-info-value" id="edgeCount">0</span></div>
        <div class="canvas-info-item">选中: <span class="canvas-info-value" id="selectedCount">0</span></div>
      </div>
      <!-- 搜索面板 -->
      <div class="search-panel" id="searchPanel">
        <input type="text" id="nodeSearchInput" placeholder="搜索节点名称..." oninput="handleNodeSearch(this.value)">
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>

    <div class="log-panel" id="logPanel">
      <div class="resize-handle" onmousedown="startResize(event,'logPanel')"></div>
      <div class="log-header">
        <div class="log-main-tabs">
          <button class="log-main-tab active" onclick="switchLogTab('execution')">
            执行日志<span class="badge" id="execLogCount">0</span>
          </button>
          <button class="log-main-tab" onclick="switchLogTab('agent')">
            Agent交互<span class="badge" id="agentLogCount">0</span>
          </button>
          <button class="log-main-tab" onclick="switchLogTab('api')">
            API日志<span class="badge" id="apiLogCount">0</span>
          </button>
          <button class="log-main-tab" onclick="switchLogTab('operation')">
            操作日志<span class="badge" id="opLogCount">0</span>
          </button>
        </div>
        <div class="log-actions">
          <button class="log-action-btn" onclick="refreshOperationLogs()">刷新</button>
          <button class="log-action-btn" onclick="clearCurrentLogs()">清空</button>
          <button class="log-action-btn" onclick="exportCurrentLogs()">导出</button>
        </div>
      </div>
      <div class="log-content-wrapper">
        <div class="log-content active" id="execLogContent"></div>
        <div class="log-content" id="agentLogContent"></div>
        <div class="log-content" id="apiLogContent" style="overflow-y:auto;padding:8px;font-family:monospace;font-size:12px;"></div>
        <div class="log-content" id="operationLogContent">
          <div class="op-log-filters" style="padding:8px;background:#252525;border-bottom:1px solid #3a3a3a;">
            <select id="opLogTypeFilter" onchange="refreshOperationLogs()" style="background:#333;color:#fff;border:1px solid #444;padding:4px 8px;border-radius:4px;">
              <option value="">全部类型</option>
              <option value="NODE">节点操作</option>
              <option value="AI">AI调用</option>
              <option value="API">API调用</option>
              <option value="WORKFLOW">工作流</option>
              <option value="ERROR">错误</option>
            </select>
            <select id="opLogDateFilter" onchange="refreshOperationLogs()" style="background:#333;color:#fff;border:1px solid #444;padding:4px 8px;border-radius:4px;margin-left:8px;">
              <option value="">今天</option>
            </select>
          </div>
          <div id="opLogList" style="overflow-y:auto;flex:1;padding:8px;"></div>
        </div>
      </div>
    </div>
